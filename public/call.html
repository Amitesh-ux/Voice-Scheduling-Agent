<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheduling Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .container { text-align: center; padding: 40px; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; }
    p { color: #888; font-size: 16px; margin-bottom: 40px; }
    #callBtn {
      background: #fff;
      color: #0f0f0f;
      border: none;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    #callBtn:hover { background: #e0e0e0; transform: scale(1.03); }
    #callBtn.active { background: #ff4444; color: #fff; }
    #status { margin-top: 24px; font-size: 14px; color: #555; min-height: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scheduling Agent</h1>
    <p>Click the button and speak to book a meeting on your Google Calendar.</p>
    <button id="callBtn">Start Call</button>
    <div id="status"></div>
  </div>

  <script type="module">
    import Vapi from 'https://esm.sh/@vapi-ai/web';

    const vapi = new Vapi('2917e0dc-85da-4ab5-a1c9-07597846eca2');
    const ASSISTANT_ID = '8afbdf35-e07a-4bf2-b2e5-8c312190d64a';
    let active = false;

    const btn = document.getElementById('callBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      if (!active) {
        vapi.start(ASSISTANT_ID);
      } else {
        vapi.stop();
      }
    });

    vapi.on('call-start', () => {
      active = true;
      btn.textContent = 'End Call';
      btn.classList.add('active');
      status.textContent = 'Connected — go ahead and speak';
    });

    vapi.on('call-end', () => {
      active = false;
      btn.textContent = 'Start Call';
      btn.classList.remove('active');
      status.textContent = 'Call ended';
    });

    vapi.on('error', (e) => {
      status.textContent = 'Something went wrong, please try again';
      console.error(e);
    });
  </script>
</body>
</html>
